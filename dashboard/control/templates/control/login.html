<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartBot Tg — Sign In</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            neumorphic: {
              bg: '#E0E5EC',
              fg: '#3D4852',
              muted: '#6B7280',
              accent: '#6C63FF',
              accentLight: '#8B84FF',
              accentSecondary: '#38B2AC',
            }
          },
          fontFamily: {
            display: ['"Plus Jakarta Sans"', 'sans-serif'],
            body: ['"DM Sans"', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #E0E5EC;
      color: #3D4852;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }
    
    .font-display {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    /* Neumorphic Shadows System (RGBA for premium smooth blending) */
    .neo-extruded {
      box-shadow: 9px 9px 16px rgba(163, 177, 198, 0.6), -9px -9px 16px rgba(255, 255, 255, 0.6);
    }
    .neo-lifted {
      box-shadow: 12px 12px 20px rgba(163, 177, 198, 0.7), -12px -12px 20px rgba(255, 255, 255, 0.7);
    }
    .neo-extruded-sm {
      box-shadow: 5px 5px 10px rgba(163, 177, 198, 0.6), -5px -5px 10px rgba(255, 255, 255, 0.5);
    }
    .neo-inset {
      box-shadow: inset 6px 6px 10px rgba(163, 177, 198, 0.6), inset -6px -6px 10px rgba(255, 255, 255, 0.5);
    }
    .neo-inset-deep {
      box-shadow: inset 10px 10px 20px rgba(163, 177, 198, 0.7), inset -10px -10px 20px rgba(255, 255, 255, 0.6);
    }
    .neo-inset-sm {
      box-shadow: inset 3px 3px 6px rgba(163, 177, 198, 0.6), inset -3px -3px 6px rgba(255, 255, 255, 0.5);
    }

    /* Primary Violet CTA Shadows */
    .neo-btn-primary {
      background-color: #6C63FF;
      color: #FFFFFF;
      box-shadow: 4px 4px 10px rgba(74, 58, 206, 0.5), -4px -4px 10px rgba(255, 255, 255, 0.35);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .neo-btn-primary:hover {
      background-color: #7A72FF;
      box-shadow: 6px 6px 14px rgba(74, 58, 206, 0.6), -6px -6px 14px rgba(255, 255, 255, 0.4);
      transform: translateY(-1px);
    }
    .neo-btn-primary:active {
      box-shadow: inset 4px 4px 8px rgba(48, 35, 163, 0.6), inset -4px -4px 8px rgba(255, 255, 255, 0.2);
      transform: translateY(0.5px);
    }

    /* Custom Checkbox Shadow Play */
    .neo-checkbox {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      box-shadow: 3px 3px 6px rgba(163, 177, 198, 0.6), -3px -3px 6px rgba(255, 255, 255, 0.5);
      transition: all 0.2s ease;
    }
    .neo-checkbox.checked {
      box-shadow: inset 3px 3px 6px rgba(163, 177, 198, 0.6), inset -3px -3px 6px rgba(255, 255, 255, 0.5);
      color: #6C63FF;
    }

    /* Ambient Floating Animations */
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(4deg); }
    }
    .animate-float {
      animation: float 7s ease-in-out infinite;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center relative p-6">

  <!-- Ambient concentric circle decoration -->
  <div class="absolute w-96 h-96 rounded-full neo-inset opacity-40 animate-float -top-20 -left-20 pointer-events-none"></div>
  <div class="absolute w-80 h-80 rounded-full neo-extruded opacity-25 -bottom-20 -right-20 pointer-events-none"></div>

  <!-- Main Card -->
  <div class="w-full max-w-md rounded-[32px] p-8 md:p-10 neo-extruded bg-[#E0E5EC] space-y-6 z-10 relative">
    
    <!-- Logo -->
    <div class="text-center space-y-2">
      <div class="w-14 h-14 bg-[#E0E5EC] rounded-2xl flex items-center justify-center neo-inset-deep mx-auto text-neumorphic-accent">
        <i data-lucide="layers" class="w-7 h-7"></i>
      </div>
      <h1 class="text-2xl md:text-3xl font-display font-extrabold text-neumorphic-fg tracking-tight">SmartBot Suite</h1>
      <p id="sub-title" class="text-xs text-neumorphic-muted font-body">Sign in to your account or register to get started.</p>
    </div>

    <!-- Mode Switcher Tabs (Sign In / Sign Up) -->
    <div class="flex rounded-2xl p-1 bg-[#E0E5EC] neo-inset">
      <button 
        type="button" 
        id="tab-login"
        onclick="switchMode('login')"
        class="flex-1 py-2.5 rounded-xl text-xs font-bold text-neumorphic-accent bg-[#E0E5EC] neo-extruded-sm transition-all focus:outline-none"
      >
        Sign In
      </button>
      <button 
        type="button" 
        id="tab-signup"
        onclick="switchMode('signup')"
        class="flex-1 py-2.5 rounded-xl text-xs font-bold text-neumorphic-muted hover:text-neumorphic-fg transition-all focus:outline-none"
      >
        Sign Up
      </button>
    </div>

    <!-- Social OAuth Login Buttons -->
    <div class="space-y-3">
      <a 
        href="/auth/google/" 
        class="w-full py-3 px-4 rounded-2xl text-xs font-bold bg-[#E0E5EC] neo-extruded hover:shadow-neo-lifted active:shadow-neo-inset text-neumorphic-fg flex items-center justify-center gap-3 transition-all cursor-pointer font-body border border-white/40"
      >
        <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
        </svg>
        <span>Continue with Google</span>
      </a>

      <a 
        href="/auth/github/" 
        class="w-full py-3 px-4 rounded-2xl text-xs font-bold bg-[#E0E5EC] neo-extruded hover:shadow-neo-lifted active:shadow-neo-inset text-neumorphic-fg flex items-center justify-center gap-3 transition-all cursor-pointer font-body border border-white/40"
      >
        <svg class="w-4 h-4 flex-shrink-0 fill-current text-neumorphic-fg" viewBox="0 0 24 24">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        <span>Continue with GitHub</span>
      </a>
    </div>

    <!-- Divider -->
    <div class="relative flex items-center justify-center">
      <div class="w-full border-t border-gray-300/50"></div>
      <span class="absolute bg-[#E0E5EC] px-3 text-[10px] font-bold uppercase tracking-wider text-neumorphic-muted">OR WITH EMAIL</span>
    </div>

    <!-- Alert Area (Redirect Warning or Errors) -->
    <div id="auth-alert" class="hidden p-3.5 rounded-xl text-xs font-semibold text-rose-700 bg-rose-100/70 border border-rose-300/40 flex items-start gap-2.5">
      <i data-lucide="alert-circle" class="w-4 h-4 text-rose-600 flex-shrink-0 mt-0.5"></i>
      <span id="auth-alert-text"></span>
    </div>

    <!-- Form -->
    <form id="auth-form" class="space-y-4">
      <!-- Name Input (Sign Up Only) -->
      <div id="name-field" class="space-y-1.5 hidden">
        <label class="block text-[11px] font-bold uppercase tracking-wider text-neumorphic-muted">Full Name</label>
        <div class="relative">
          <span class="absolute left-4 top-3 text-neumorphic-muted">
            <i data-lucide="user" class="w-4 h-4"></i>
          </span>
          <input 
            id="name-input"
            type="text"
            placeholder="John Doe"
            class="w-full bg-[#E0E5EC] neo-inset rounded-2xl pl-11 pr-4 py-2.5 text-sm text-neumorphic-fg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-neumorphic-accent focus:ring-offset-2 transition-all font-body"
          />
        </div>
      </div>

      <!-- Email Input -->
      <div class="space-y-1.5">
        <label class="block text-[11px] font-bold uppercase tracking-wider text-neumorphic-muted">Email Address</label>
        <div class="relative">
          <span class="absolute left-4 top-3 text-neumorphic-muted">
            <i data-lucide="mail" class="w-4 h-4"></i>
          </span>
          <input 
            id="email-input"
            type="email"
            placeholder="developer@smartbot.tg"
            required
            class="w-full bg-[#E0E5EC] neo-inset rounded-2xl pl-11 pr-4 py-2.5 text-sm text-neumorphic-fg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-neumorphic-accent focus:ring-offset-2 transition-all font-body"
          />
        </div>
      </div>

      <!-- Password Input -->
      <div class="space-y-1.5">
        <label class="block text-[11px] font-bold uppercase tracking-wider text-neumorphic-muted">Password</label>
        <div class="relative">
          <span class="absolute left-4 top-3 text-neumorphic-muted">
            <i data-lucide="lock" class="w-4 h-4"></i>
          </span>
          <input 
            id="password-input"
            type="password"
            placeholder="••••••••"
            required
            class="w-full bg-[#E0E5EC] neo-inset rounded-2xl pl-11 pr-4 py-2.5 text-sm text-neumorphic-fg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-neumorphic-accent focus:ring-offset-2 transition-all font-body"
          />
        </div>
      </div>

      <!-- Submit Button -->
      <div class="pt-2">
        <button
          type="submit"
          id="submit-btn"
          class="w-full py-3.5 rounded-2xl text-sm font-semibold neo-btn-primary flex items-center justify-center gap-2 focus:outline-none focus:ring-2 focus:ring-neumorphic-accent focus:ring-offset-2"
        >
          <span id="submit-btn-text">Sign In</span>
          <i data-lucide="log-in" class="w-4 h-4" id="submit-btn-icon"></i>
        </button>
      </div>
    </form>

    <!-- Footer link to home -->
    <div class="text-center pt-1">
      <a href="/" class="text-xs font-bold text-neumorphic-muted hover:text-neumorphic-accent transition-colors flex items-center justify-center gap-1.5 focus:outline-none">
        <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i>
        Back to Homepage
      </a>
    </div>
  </div>

  <script>
    lucide.createIcons();

    let currentMode = 'login'; // 'login' or 'signup'

    const alertBanner = document.getElementById('auth-alert');
    const alertText = document.getElementById('auth-alert-text');
    const form = document.getElementById('auth-form');
    const nameField = document.getElementById('name-field');
    const nameInput = document.getElementById('name-input');
    const emailInput = document.getElementById('email-input');
    const passwordInput = document.getElementById('password-input');
    const submitBtn = document.getElementById('submit-btn');
    const submitBtnText = document.getElementById('submit-btn-text');
    const submitBtnIcon = document.getElementById('submit-btn-icon');
    const tabLogin = document.getElementById('tab-login');
    const tabSignup = document.getElementById('tab-signup');
    const subTitle = document.getElementById('sub-title');

    // Parse URL messages
    const urlParams = new URLSearchParams(window.location.search);
    const redirectReason = urlParams.get('msg');
    if (redirectReason) {
      alertText.textContent = redirectReason;
      alertBanner.classList.remove('hidden');
      window.history.replaceState({}, document.title, window.location.pathname);
    }

    function switchMode(mode) {
      currentMode = mode;
      alertBanner.classList.add('hidden');

      if (mode === 'signup') {
        nameField.classList.remove('hidden');
        nameInput.required = true;
        tabSignup.className = "flex-1 py-2.5 rounded-xl text-xs font-bold text-neumorphic-accent bg-[#E0E5EC] neo-extruded-sm transition-all focus:outline-none";
        tabLogin.className = "flex-1 py-2.5 rounded-xl text-xs font-bold text-neumorphic-muted hover:text-neumorphic-fg transition-all focus:outline-none";
        submitBtnText.textContent = "Create Account";
        subTitle.textContent = "Create a new developer account to access the Control Hub.";
      } else {
        nameField.classList.add('hidden');
        nameInput.required = false;
        tabLogin.className = "flex-1 py-2.5 rounded-xl text-xs font-bold text-neumorphic-accent bg-[#E0E5EC] neo-extruded-sm transition-all focus:outline-none";
        tabSignup.className = "flex-1 py-2.5 rounded-xl text-xs font-bold text-neumorphic-muted hover:text-neumorphic-fg transition-all focus:outline-none";
        submitBtnText.textContent = "Sign In";
        subTitle.textContent = "Enter your credentials to unlock the Control Hub.";
      }
      lucide.createIcons();
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBanner.classList.add('hidden');

      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();
      const name = nameInput.value.trim();

      submitBtn.disabled = true;
      submitBtn.innerHTML = `
        <i data-lucide="refresh-cw" class="w-4 h-4 animate-spin"></i>
        <span>${currentMode === 'signup' ? 'Creating Account...' : 'Authenticating...'}</span>
      `;
      lucide.createIcons();

      try {
        const endpoint = currentMode === 'signup' ? '/api/auth/signup' : '/api/auth/login';
        const payload = currentMode === 'signup' ? { name, email, password } : { email, password };

        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (data.success || data.authenticated) {
          localStorage.setItem('isLoggedIn', 'true');
          window.location.href = '/dashboard/';
        } else {
          alertText.textContent = data.error || 'Authentication failed. Please check credentials.';
          alertBanner.classList.remove('hidden');
          submitBtn.disabled = false;
          submitBtnText.textContent = currentMode === 'signup' ? 'Create Account' : 'Sign In';
          submitBtn.innerHTML = `
            <span>${currentMode === 'signup' ? 'Create Account' : 'Sign In'}</span>
            <i data-lucide="log-in" class="w-4 h-4"></i>
          `;
          lucide.createIcons();
        }
      } catch (err) {
        alertText.textContent = err.message || 'Server connection error. Please try again.';
        alertBanner.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtnText.textContent = currentMode === 'signup' ? 'Create Account' : 'Sign In';
        submitBtn.innerHTML = `
          <span>${currentMode === 'signup' ? 'Create Account' : 'Sign In'}</span>
          <i data-lucide="log-in" class="w-4 h-4"></i>
        `;
        lucide.createIcons();
      }
    });
  </script>
</body>
</html>
